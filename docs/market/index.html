<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pacific Cards — Market Monitor</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f9fafb; color: #111827; padding: 24px; max-width: 1100px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 28px; }
    h2 { font-size: 15px; font-weight: 600; margin: 32px 0 12px; color: #111827; }
    hr { border: none; border-top: 1px solid #e5e7eb; margin: 32px 0; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; margin-bottom: 24px; }
    select { font-size: 13px; padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; margin-bottom: 16px; }
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; color: #6b7280; font-weight: 600; border-bottom: 2px solid #e5e7eb; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { color: #374151; }
    td { padding: 8px 12px; border-bottom: 1px solid #f3f4f6; }
    tr:last-child td { border-bottom: none; }
    .up   { color: #16a34a; font-weight: 500; }
    .down { color: #dc2626; font-weight: 500; }
    .neu  { color: #6b7280; }
    .tag  { display: inline-block; font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
    .tag-bin     { background: #eff6ff; color: #1d4ed8; }
    .tag-auction { background: #fef3c7; color: #92400e; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .empty { color: #9ca3af; font-size: 13px; padding: 16px 0; }
    .chart-wrap { position: relative; height: 260px; }
    details { margin-top: 32px; }
    details summary { cursor: pointer; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    details summary h2 { display: inline; }
    details summary::before { content: '▶ '; font-size: 11px; color: #9ca3af; margin-right: 4px; }
    details[open] summary::before { content: '▼ '; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 680px) { .two-col { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<h1>Pacific Cards Co. — Market Monitor</h1>
<p class="subtitle" id="subtitle">Loading…</p>

<!-- Overview -->
<h2>Overview</h2>
<div class="card">
  <div id="overview-wrap"></div>
</div>

<hr>

<!-- Trend Charts -->
<h2>Trend Analysis</h2>
<select id="query-select"></select>
<div class="two-col">
  <div class="card">
    <div style="font-size:13px;color:#6b7280;font-weight:600;margin-bottom:12px">Supply (BIN + Auction Listings)</div>
    <div class="chart-wrap"><canvas id="count-chart"></canvas></div>
  </div>
  <div class="card">
    <div style="font-size:13px;color:#6b7280;font-weight:600;margin-bottom:12px">Median Price ($)</div>
    <div class="chart-wrap"><canvas id="price-chart"></canvas></div>
  </div>
</div>

<!-- Price Distribution -->
<h2>Price Distribution — BIN Listings <span id="hist-query-label" style="font-weight:400;color:#6b7280"></span></h2>
<div class="card">
  <div class="chart-wrap"><canvas id="hist-chart"></canvas></div>
</div>

<!-- Sold Yesterday -->
<details open>
  <summary><h2 style="display:inline">Sold Yesterday <span id="gone-query-label" style="font-weight:400;color:#6b7280"></span></h2></summary>
  <div class="card" style="margin-top:12px" id="gone-table-wrap"><p class="empty">Listings that disappeared since yesterday (proxy: sold or ended).</p></div>
</details>

<!-- Active BIN Listings -->
<details open>
  <summary><h2 style="display:inline">Active BIN Listings <span id="bin-query-label" style="font-weight:400;color:#6b7280"></span></h2></summary>
  <div class="card" style="margin-top:12px" id="bin-table-wrap"></div>
</details>

<!-- Active Auctions -->
<details open>
  <summary><h2 style="display:inline">Active Auctions <span id="auction-query-label" style="font-weight:400;color:#6b7280"></span></h2></summary>
  <div class="card" style="margin-top:12px" id="auction-table-wrap"></div>
</details>

<script>
let DATA = null;
let countChart = null, priceChart = null, histChart = null;
let overviewSort = { col: 'name', dir: 1 };
let binSort     = { col: 'price',    dir: 1 };
let auctionSort = { col: 'end_time', dir: 1 };
let currentQueryId = null;

// ── Utilities ────────────────────────────────────────────────────────────────

function pct(cur, prior) {
  if (cur == null || prior == null || prior === 0) return null;
  return (cur - prior) / prior;
}

function fmtPct(val) {
  if (val == null) return '<span class="neu">—</span>';
  const cls = val > 0 ? 'up' : val < 0 ? 'down' : 'neu';
  const sign = val > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${(val * 100).toFixed(1)}%</span>`;
}

function fmtPrice(v) {
  return v != null ? `$${Number(v).toFixed(2)}` : '—';
}

function fmtNum(v) {
  return v != null ? v.toLocaleString() : '—';
}

function buyingTag(fmt) {
  return fmt === 'AUCTION'
    ? '<span class="tag tag-auction">Auction</span>'
    : '<span class="tag tag-bin">BIN</span>';
}

function sortArrow(col, sortState) {
  if (sortState.col !== col) return ' <span style="color:#d1d5db">↕</span>';
  return sortState.dir === 1 ? ' ↑' : ' ↓';
}

function fmtTimeRemaining(end_time_str) {
  if (!end_time_str) return '—';
  const fetched = DATA.fetched_at ? new Date(DATA.fetched_at) : new Date(DATA.generated_at);
  const end = new Date(end_time_str);
  const ms = end - fetched;
  if (ms <= 0) return 'Ended';
  const totalMins = Math.floor(ms / 60000);
  const d = Math.floor(totalMins / 1440);
  const h = Math.floor((totalMins % 1440) / 60);
  const m = totalMins % 60;
  if (d > 0) return `${d}d ${h}h`;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

// ── Chart helpers ─────────────────────────────────────────────────────────────

const BLUE   = '#3b82f6';
const GREEN  = '#10b981';
const GRID   = '#f3f4f6';

function chartDefaults() {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { color: GRID }, ticks: { font: { size: 11 }, maxTicksLimit: 8 } },
      y: { grid: { color: GRID }, ticks: { font: { size: 11 } }, beginAtZero: false },
    },
  };
}

function buildLineChart(id, labels, dataset, color, yOptions = {}) {
  const ctx = document.getElementById(id).getContext('2d');
  const opts = chartDefaults();
  Object.assign(opts.scales.y, yOptions);
  return new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: dataset, borderColor: color, backgroundColor: color + '22',
        pointRadius: 2, tension: 0.3, fill: true,
      }],
    },
    options: opts,
  });
}

function buildHistogram(prices) {
  if (!prices || prices.length === 0) return;
  const BIN_WIDTH = 5;
  const binStart = Math.floor(Math.min(...prices) / BIN_WIDTH) * BIN_WIDTH;
  const binEnd   = Math.ceil(Math.max(...prices)  / BIN_WIDTH) * BIN_WIDTH;
  const labels = [], counts = [];
  const end = binStart === binEnd ? binStart + BIN_WIDTH : binEnd;
  for (let lo = binStart; lo < end; lo += BIN_WIDTH) {
    const hi = lo + BIN_WIDTH - 1;
    labels.push(`$${lo}–${hi}`);
    counts.push(prices.filter(p => p >= lo && p < lo + BIN_WIDTH).length);
  }
  const ctx = document.getElementById('hist-chart').getContext('2d');
  if (histChart) histChart.destroy();
  histChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{ data: counts, backgroundColor: BLUE + 'cc', borderRadius: 3 }],
    },
    options: {
      ...chartDefaults(),
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { grid: { color: GRID }, ticks: { font: { size: 11 }, stepSize: 1 }, beginAtZero: true },
      },
    },
  });
}

// ── Overview table ────────────────────────────────────────────────────────────

function renderOverview() {
  const wrap = document.getElementById('overview-wrap');

  const rows = DATA.queries.map(q => {
    const t = DATA.today[q.id] || {};
    const y = DATA.yesterday[q.id] || {};
    return {
      name:          q.name,
      type:          q.type || null,
      listing_count: t.listing_count ?? null,
      price_median:  t.price_median  ?? null,
      vs_yesterday:  pct(t.price_median, y.price_median),
      new_count:     t.new_count     ?? null,
      new_median:    (DATA.new_medians  || {})[q.id] ?? null,
      gone_count:    t.gone_count    ?? null,
      gone_median:   (DATA.gone_medians || {})[q.id] ?? null,
    };
  });

  const col = overviewSort.col;
  const dir = overviewSort.dir;
  rows.sort((a, b) => {
    const av = a[col], bv = b[col];
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (col === 'name') return av.localeCompare(bv) * dir;
    return (av - bv) * dir;
  });

  function th(label, c, align) {
    const style = align === 'right' ? 'text-align:right' : '';
    return `<th class="sortable" style="${style}" onclick="sortOverview('${c}')">${label}${sortArrow(c, overviewSort)}</th>`;
  }

  const htmlRows = rows.map(r => `<tr>
    <td style="font-weight:500">${r.name}</td>
    <td>${r.type ?? '<span class="neu">—</span>'}</td>
    <td style="text-align:right">${fmtNum(r.listing_count)}</td>
    <td style="text-align:right">${fmtPrice(r.price_median)}</td>
    <td style="text-align:right">${fmtPct(r.vs_yesterday)}</td>
    <td style="text-align:right;color:#16a34a;font-weight:500">${fmtNum(r.new_count)}</td>
    <td style="text-align:right">${r.new_median  != null ? fmtPrice(r.new_median)  : '<span class="neu">—</span>'}</td>
    <td style="text-align:right;color:#dc2626;font-weight:500">${fmtNum(r.gone_count)}</td>
    <td style="text-align:right">${r.gone_median != null ? fmtPrice(r.gone_median) : '<span class="neu">—</span>'}</td>
  </tr>`).join('');

  wrap.innerHTML = `<table id="overview-table"><thead><tr>
    ${th('Product',        'name',          'left')}
    ${th('Type',           'type',          'left')}
    ${th('Listings',       'listing_count', 'right')}
    ${th('Median Price',   'price_median',  'right')}
    ${th('vs Yesterday',   'vs_yesterday',  'right')}
    ${th('New Today',      'new_count',     'right')}
    ${th('New Median',     'new_median',    'right')}
    ${th('Sold Yesterday', 'gone_count',    'right')}
    ${th('Sold Median',    'gone_median',   'right')}
  </tr></thead><tbody>${htmlRows || '<tr><td colspan="9" class="empty">No data yet.</td></tr>'}</tbody></table>`;
}

function sortOverview(col) {
  if (overviewSort.col === col) {
    overviewSort.dir *= -1;
  } else {
    overviewSort.col = col;
    overviewSort.dir = col === 'name' ? 1 : -1;
  }
  renderOverview();
}

// ── Trend charts ──────────────────────────────────────────────────────────────

function renderTrends(queryId) {
  const series = DATA.trends[queryId] || [];
  const labels = series.map(r => r.date.slice(5)); // MM-DD
  const counts  = series.map(r => r.listing_count);
  const medians = series.map(r => r.price_median);
  const q = DATA.queries.find(q => q.id === queryId);
  const msrp = q && q.msrp != null ? q.msrp : null;

  if (countChart) countChart.destroy();
  if (priceChart) priceChart.destroy();
  countChart = buildLineChart('count-chart', labels, counts, BLUE, {
    ticks: { font: { size: 11 }, precision: 0 },
  });

  const ctx = document.getElementById('price-chart').getContext('2d');
  const datasets = [{
    data: medians, borderColor: GREEN, backgroundColor: GREEN + '22',
    pointRadius: 2, tension: 0.3, fill: true, label: 'Median Price',
  }];
  if (msrp !== null) {
    datasets.push({
      data: labels.map(() => msrp),
      borderColor: '#f59e0b',
      borderWidth: 2,
      borderDash: [6, 4],
      pointRadius: 0,
      fill: false,
      label: `MSRP $${msrp.toFixed(2)}`,
    });
  }
  const opts = chartDefaults();
  opts.scales.y.ticks = { font: { size: 11 }, callback: v => `$${v}` };
  if (msrp !== null) {
    opts.plugins = { legend: { display: true, labels: { font: { size: 11 }, boxWidth: 20 } } };
  }
  priceChart = new Chart(ctx, { type: 'line', data: { labels, datasets }, options: opts });
}

// ── Sold Yesterday ────────────────────────────────────────────────────────────

function renderGoneTable(queryId) {
  const wrap = document.getElementById('gone-table-wrap');
  const items = DATA.gone_items[queryId] || [];
  if (items.length === 0) {
    wrap.innerHTML = '<p class="empty">None today.</p>';
    return;
  }
  const rows = items.map(i => `<tr>
    <td>${i.url ? `<a href="${i.url}" target="_blank" rel="noopener">${i.title}</a>` : i.title}</td>
    <td style="text-align:right">${fmtPrice(i.price)}</td>
    <td style="text-align:right">${buyingTag(i.buying_format)}</td>
    <td style="text-align:right">${i.first_seen}</td>
  </tr>`).join('');
  wrap.innerHTML = `<table>
    <thead><tr>
      <th>Title</th>
      <th style="text-align:right">Last Price</th>
      <th style="text-align:right">Format</th>
      <th style="text-align:right">First Seen</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── BIN listings (sortable) ───────────────────────────────────────────────────

function renderBinTable(queryId) {
  const wrap = document.getElementById('bin-table-wrap');
  const items = DATA.bin_listings[queryId] || [];
  if (items.length === 0) {
    wrap.innerHTML = '<p class="empty">No BIN listings.</p>';
    return;
  }
  const sorted = [...items].sort((a, b) => {
    if (binSort.col === 'price') return ((a.price || 0) - (b.price || 0)) * binSort.dir;
    return (a.title || '').localeCompare(b.title || '') * binSort.dir;
  });

  const rows = sorted.map(i => `<tr>
    <td><a href="${i.url}" target="_blank">${i.title}</a></td>
    <td style="text-align:right">${fmtPrice(i.price)}</td>
  </tr>`).join('');

  wrap.innerHTML = `<table>
    <thead><tr>
      <th class="sortable" onclick="sortBin('title')">Title${sortArrow('title', binSort)}</th>
      <th class="sortable" style="text-align:right" onclick="sortBin('price')">Price${sortArrow('price', binSort)}</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function sortBin(col) {
  if (binSort.col === col) {
    binSort.dir *= -1;
  } else {
    binSort.col = col;
    binSort.dir = 1;
  }
  renderBinTable(currentQueryId);
}

// ── Auction listings ──────────────────────────────────────────────────────────

function renderAuctionTable(queryId) {
  const wrap = document.getElementById('auction-table-wrap');
  const items = DATA.auction_listings[queryId] || [];
  if (items.length === 0) {
    wrap.innerHTML = '<p class="empty">No active auctions.</p>';
    return;
  }

  const sorted = [...items].sort((a, b) => {
    if (auctionSort.col === 'price') {
      return ((a.price || 0) - (b.price || 0)) * auctionSort.dir;
    }
    // nulls sort to bottom on asc, top on desc — consistent with direction
    if (!a.end_time && !b.end_time) return 0;
    if (!a.end_time) return auctionSort.dir;
    if (!b.end_time) return -auctionSort.dir;
    return (new Date(a.end_time) - new Date(b.end_time)) * auctionSort.dir;
  });

  const fetchedAt = DATA.fetched_at
    ? new Date(DATA.fetched_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true })
    : null;

  const rows = sorted.map(i => `<tr>
    <td><a href="${i.url}" target="_blank">${i.title}</a></td>
    <td style="text-align:right">${i.price > 0 ? fmtPrice(i.price) : '—'}</td>
    <td style="text-align:right">${i.bid_count != null ? i.bid_count : '—'}</td>
    <td style="text-align:right">${fmtTimeRemaining(i.end_time)}</td>
  </tr>`).join('');

  wrap.innerHTML = `
    ${fetchedAt ? `<div style="text-align:right;font-style:italic;font-size:12px;color:#9ca3af;margin-bottom:8px">as of ${fetchedAt}</div>` : ''}
    <table>
    <thead><tr>
      <th>Title</th>
      <th class="sortable" style="text-align:right" onclick="sortAuction('price')">Current Bid${sortArrow('price', auctionSort)}</th>
      <th style="text-align:right">Bids</th>
      <th class="sortable" style="text-align:right" onclick="sortAuction('end_time')">Time Remaining${sortArrow('end_time', auctionSort)}</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function sortAuction(col) {
  if (auctionSort.col === col) {
    auctionSort.dir *= -1;
  } else {
    auctionSort.col = col;
    auctionSort.dir = 1;
  }
  renderAuctionTable(currentQueryId);
}

// ── Query selector ────────────────────────────────────────────────────────────

function updateQuery(queryId) {
  currentQueryId = queryId;
  const q = DATA.queries.find(q => q.id === queryId);
  const name = q ? ` — ${q.name}` : '';
  document.getElementById('hist-query-label').textContent    = name;
  document.getElementById('gone-query-label').textContent    = name;
  document.getElementById('bin-query-label').textContent     = name;
  document.getElementById('auction-query-label').textContent = name;

  renderTrends(queryId);
  buildHistogram(DATA.prices[queryId]);
  renderGoneTable(queryId);
  binSort     = { col: 'price',    dir: 1 };
  auctionSort = { col: 'end_time', dir: 1 };
  renderBinTable(queryId);
  renderAuctionTable(queryId);
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────

async function init() {
  try {
    DATA = await fetch('./market_data.json').then(r => r.json());
  } catch (e) {
    document.getElementById('subtitle').textContent = 'Could not load market_data.json — run the pipeline first.';
    return;
  }

  if (!DATA.queries || DATA.queries.length === 0) {
    document.getElementById('subtitle').textContent = 'No data yet — run the pipeline first.';
    return;
  }

  document.getElementById('subtitle').textContent =
    `Last updated: ${DATA.generated_at}`;

  // Populate query dropdown
  const sel = document.getElementById('query-select');
  DATA.queries.forEach(q => {
    const opt = document.createElement('option');
    opt.value = q.id; opt.textContent = q.name;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => updateQuery(sel.value));

  renderOverview();
  updateQuery(DATA.queries[0].id);
}

init();
</script>
</body>
</html>
