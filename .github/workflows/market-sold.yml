name: Market Sold Comps

on:
  workflow_dispatch:
    inputs:
      query_ids:
        description: 'Comma-separated query IDs to update (empty = all)'
        required: false
        default: ''

concurrency:
  group: market-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch sold listings
        env:
          SOLD_COMPS_API_KEY:        ${{ secrets.SOLD_COMPS_API_KEY }}
          SUPABASE_DB_URL:            ${{ secrets.SUPABASE_DB_URL }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          MARKET_MONITOR_SHEET_ID:   ${{ secrets.MARKET_MONITOR_SHEET_ID }}
          FETCH_QUERY_IDS:           ${{ github.event.inputs.query_ids }}
        run: python -m market_monitor.fetch_sold

      - name: Regenerate dashboard data
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m market_monitor.generate_dashboard

      - name: Commit market_data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/market/market_data.json
          git diff --staged --quiet || git commit -m "chore: sold comps snapshot $(date +%Y-%m-%d)"
          git pull --rebase
          git push
