name: Analytics daily ingest

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Set to 1 to run a historical backfill'
        required: false
        default: ''
      backfill_start:
        description: 'Backfill start date (YYYY-MM-DD), default 2026-01-01'
        required: false
        default: '2026-01-01'
  push:
    paths:
      - 'analytics/**'
      - 'shared/**'

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: Fetch from eBay APIs
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN_READ }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKFILL: ${{ github.event.inputs.backfill }}
          BACKFILL_START: ${{ github.event.inputs.backfill_start }}
        run: python -m analytics.run_ingest

      - name: Compute metrics
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m analytics.compute_metrics
