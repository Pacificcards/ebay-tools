name: Analytics daily ingest

on:
  # Triggered daily at 10:00 UTC (3am PT) by cron-job.org via workflow_dispatch
  workflow_dispatch:
  push:
    paths:
      - 'traffic_analytics/**'
      - 'shared/**'

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: Fetch from eBay APIs
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN_READ }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m traffic_analytics.run_ingest

      - name: Fetch billing activity (fees)
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN_READ }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m traffic_analytics.fetch_finances

      - name: Compute metrics
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m traffic_analytics.compute_metrics

      - name: Send daily report
        if: github.event_name != 'push'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -m traffic_analytics.send_daily_report
